<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Solar System with Labels</title>
  <script src="./script/aframe.min.js"></script>
</head>

<body>
  <a-scene background="color: black">

    <!-- ================= ASSETS ================= -->
    <a-assets>
      <img id="sunTex" src="./texture/2k_sun.jpg">
      <img id="mercuryTex" src="./texture/2k_mercury.jpg">
      <img id="venusTex" src="./texture/2k_venus_surface.jpg">
      <img id="earthTex" src="./texture/2k_earth_daymap.jpg">
      <img id="moonTex" src="./texture/2k_moon.jpg">
      <img id="marsTex" src="./texture/2k_mars.jpg">
      <img id="jupiterTex" src="./texture/2k_jupiter.jpg">
      <img id="saturnTex" src="./texture/2k_saturn.jpg">
      <img id="saturnRingTex" src="./texture/2k_saturn_ring_alpha.png">
      <img id="uranusTex" src="./texture/2k_uranus.jpg">
      <img id="neptuneTex" src="./texture/2k_neptune.jpg">
      <img id="milkyway" src="./texture/2k_stars_milky_way.jpg">
    </a-assets>

    <!-- ================= BACKGROUND ================= -->
    <a-sky src="#milkyway"></a-sky>

    <!-- ================= LIGHTING ================= -->
    <a-entity light="type: ambient; intensity: 0.6"></a-entity>
    <a-entity light="type: point; intensity: 2" position="-12 5 10"></a-entity>

    <!-- ================= CAMERA ================= -->
    <a-camera position="0 4 35" look-controls="enabled:true" wasd-controls="enabled:true"></a-camera>

    <!-- ================= SUN ================= -->
    <a-sphere position="-12 0 0" radius="3" src="#sunTex"
      material="emissive:#ff9900; emissiveIntensity:0.7">
    </a-sphere>
    <a-text value="SUN" position="-12 4 0" align="center" color="#ffffff" width="4" look-at="[camera]"></a-text>

    <!-- ================= ORBIT PATHS ================= -->
    <a-entity position="-12 0 0">
      <a-ring radius-inner="3.95" radius-outer="4" rotation="90 0 0"
        material="color:#777; emissive:#777; emissiveIntensity:0.5; side:double; opacity:0.35"></a-ring>
      <a-ring radius-inner="5.95" radius-outer="6" rotation="90 0 0"
        material="color:#777; emissive:#777; emissiveIntensity:0.5; side:double; opacity:0.35"></a-ring>
      <a-ring radius-inner="7.95" radius-outer="8" rotation="90 0 0"
        material="color:#777; emissive:#777; emissiveIntensity:0.5; side:double; opacity:0.35"></a-ring>
      <a-ring radius-inner="9.95" radius-outer="10" rotation="90 0 0"
        material="color:#777; emissive:#777; emissiveIntensity:0.5; side:double; opacity:0.35"></a-ring>
      <a-ring radius-inner="12.95" radius-outer="13" rotation="90 0 0"
        material="color:#777; emissive:#777; emissiveIntensity:0.5; side:double; opacity:0.35"></a-ring>
      <a-ring radius-inner="15.95" radius-outer="16" rotation="90 0 0"
        material="color:#777; emissive:#777; emissiveIntensity:0.5; side:double; opacity:0.35"></a-ring>
      <a-ring radius-inner="18.95" radius-outer="19" rotation="90 0 0"
        material="color:#777; emissive:#777; emissiveIntensity:0.5; side:double; opacity:0.35"></a-ring>
      <a-ring radius-inner="21.95" radius-outer="22" rotation="90 0 0"
        material="color:#777; emissive:#777; emissiveIntensity:0.5; side:double; opacity:0.35"></a-ring>
      <a-ring radius-inner="24.95" radius-outer="25" rotation="90 0 0"
        material="color:#777; emissive:#777; emissiveIntensity:0.5; side:double; opacity:0.35"></a-ring>
    </a-entity>

    <!-- ================= PLANETS ================= -->

    <!-- Mercury -->
    <a-entity position="-12 0 0" animation="property: rotation; to: 0 360 0; dur: 5000; loop: true; easing: linear">
      <a-sphere radius="0.35" src="#mercuryTex" position="4 0 0"></a-sphere>
      <a-text value="Mercury" position="4 0.7 0" align="center" color="#ffffff" width="2.5" look-at="[camera]"></a-text>
    </a-entity>

    <!-- Venus -->
    <a-entity position="-12 0 0" animation="property: rotation; to: 0 360 0; dur: 8000; loop: true; easing: linear">
      <a-sphere radius="0.6" src="#venusTex" position="6 0 0"></a-sphere>
      <a-text value="Venus" position="6 0.9 0" align="center" color="#ffffff" width="3" look-at="[camera]"></a-text>
    </a-entity>

    <!-- Earth + Moon -->
    <a-entity position="-12 0 0" animation="property: rotation; to: 0 360 0; dur: 10000; loop: true; easing: linear">
      <!-- Earth -->
      <a-sphere radius="0.7" src="#earthTex" position="8 0 0"></a-sphere>
      <a-text value="Earth" position="8 1 0" align="center" color="#ffffff" width="3" look-at="[camera]"></a-text>

      <!-- Moon orbit -->
      <a-entity position="8 0 0" animation="property: rotation; to: 0 360 0; dur: 2000; loop: true; easing: linear">
        <a-sphere radius="0.18" src="#moonTex" position="1.2 0 0"></a-sphere>
        <a-text value="Moon" position="1.2 0.3 0" align="center" color="#ffffff" width="1.5" look-at="[camera]"></a-text>
      </a-entity>
    </a-entity>

    <!-- Mars -->
    <a-entity position="-12 0 0" animation="property: rotation; to: 0 360 0; dur: 13000; loop: true; easing: linear">
      <a-sphere radius="0.5" src="#marsTex" position="10 0 0"></a-sphere>
      <a-text value="Mars" position="10 0.8 0" align="center" color="#ffffff" width="3" look-at="[camera]"></a-text>
    </a-entity>

    <!-- Jupiter -->
    <a-entity position="-12 0 0" animation="property: rotation; to: 0 360 0; dur: 18000; loop: true; easing: linear">
      <a-sphere radius="1.4" src="#jupiterTex" position="13 0 0"></a-sphere>
      <a-text value="Jupiter" position="13 1.7 0" align="center" color="#ffffff" width="4" look-at="[camera]"></a-text>
    </a-entity>

    <!-- Saturn + Ring -->
    <a-entity position="-12 0 0" animation="property: rotation; to: 0 360 0; dur: 22000; loop: true; easing: linear">
      <a-sphere radius="1.2" src="#saturnTex" position="16 0 0"></a-sphere>
      <a-text value="Saturn" position="16 1.6 0" align="center" color="#ffffff" width="4" look-at="[camera]"></a-text>
      <a-ring
        position="16 0 0"
        radius-inner="1.6"
        radius-outer="2.6"
        src="#saturnRingTex"
        rotation="63 0 0"
        material="side: double; transparent: true">
      </a-ring>
    </a-entity>

    <!-- Uranus -->
    <a-entity position="-12 0 0" animation="property: rotation; to: 0 360 0; dur: 28000; loop: true; easing: linear">
      <a-sphere radius="1" src="#uranusTex" position="19 0 0"></a-sphere>
      <a-text value="Uranus" position="19 1.3 0" align="center" color="#ffffff" width="4" look-at="[camera]"></a-text>
    </a-entity>

    <!-- Neptune -->
    <a-entity position="-12 0 0" animation="property: rotation; to: 0 360 0; dur: 33000; loop: true; easing: linear">
      <a-sphere radius="1" src="#neptuneTex" position="22 0 0"></a-sphere>
      <a-text value="Neptune" position="22 1.3 0" align="center" color="#ffffff" width="4" look-at="[camera]"></a-text>
    </a-entity>

  </a-scene>
</body>

</html>
